name: ✨ Feature Request
description: Suggest a new feature for Nexus
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for your feature suggestion!

  - type: dropdown
    id: package
    attributes:
      label: Target Package
      options:
        - "@nexus/types"
        - "@nexus/events"
        - "@nexus/core"
        - "@nexus/bridge"
        - "@nexus/autonomy"
        - "@nexus/cloud"
        - "@nexus/dashboard"
        - "@nexus/mcp"
        - "@nexus/cli"
        - "@nexus/app"
        - "New package"
        - "Not sure"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've considered.

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "Nice to have"
        - "Important"
        - "Critical"
